# Level 5: Blackout - Frequency Hopping & Encryption
# Goal: Military-grade resilience using AES encryption and Frequency Hopping (FHSS).

mission:
  id: LEVEL_5_BLACKOUT

physical:
  ghost_mode: true
  samp_rate: 1000000    # Reduced rate for N150 CPU compatibility
  center_freq: 915000000
  modulation: GFSK
  freq_dev: 25000
  samples_per_symbol: 10

mac_layer:
  amc_enabled: false
  arq_enabled: true
  max_retries: 3

link_layer:
  use_comsec: true      # AES-256 Encryption enabled for heartbeats
  comsec_key: 5365637265744f70616c4b6579313233
  crc_type: CRC16
  use_fec: true
  use_interleaving: true
  interleaver_rows: 8
  use_whitening: true
  use_nrzi: true
  use_manchester: false

dsss:
  enabled: false

hopping:
  enabled: true         # FHSS enabled - radio hops frequency every epoch
  type: AES             # AES-based pseudo-random hopping sequence
  sync_mode: TOD        # Time-of-Day synchronization (uses laptop clock)
  dwell_time_ms: 1000   # Stay on one frequency for 1 second
  lookahead_ms: 50      # Pre-calculate next hop 50ms early
  num_channels: 20      # Size of the hop-set
  channel_spacing: 40000 # 40 kHz spacing between channels

hardware:
  args: type=b200
  samp_rate: 1000000
  tx_gain: 70
  rx_gain: 70
  tx_antenna: TX/RX
  rx_antenna: TX/RX

application_layer:
  payload_type: heartbeat
